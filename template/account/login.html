{% extends 'base.html' %}
{% load static %}


{% block content %}
<main data-aos="fade" data-aos-delay="0">
    <div class="main-content over-hidden">
        <!-- breadcrumb -->
        <div class="container">
            <div class="breadcrumb-container text-center-sm">
                <ol class="breadcrumb font-w-6 p-h-0 m-b-0 m-t-15">
                    <li><a href="{% url 'fabrics_main:homepage' %}">Главная</a></li>
                    <li class="active"><a href="{% url 'user_account:register' %}">Aвторизоваться</a></li>
                </ol>
            </div>
        </div>
        <div class="form__block">
            <div class="container">
            <div class="registration mx-auto d-block w-100">
                <div class="page-header text-center">
                    <h1>Sign up</h1>
                </div>

                <form id="member-registration" action="/astroidnew/index.php/pages/register?task=registration.register"
                      method="post" class="form-validate form-horizontal well" enctype="multipart/form-data">
                    <fieldset>
                        <legend>User Registration</legend>
                        <div class="form-group">
                            <label for="exampleInputPassword1">Username *</label>
                            <input type="text" class="form-control" id="exampleInputPassword1">
                        </div>
                        <div class="form-group">
                            <label for="exampleInputPassword1">Password *</label>
                            <input type="password" class="form-control" id="exampleInputPassword1">
                        </div>
                        <div class="d-flex justify-content-between align-items-center">
                            <div class="form-group d-flex justify-content-start">
                                <button type="submit" class="btn btn-primary">Submit</button>
                            </div>
                        </div>
                    </fieldset>

                </form>
            </div>
        </div>
        </div>
    </div>

</main>

<style>
	@media (min-width:767px){
		.registration{
			max-width: 400px;
            margin-left: 32%;
		}
	}



</style>

{% endblock %}
